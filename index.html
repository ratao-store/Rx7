<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rx7 Store - Web site</title>
    
    <link rel="icon" type="image/jpeg" href="favicon.jpeg">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0a12;
            --panel-bg: rgba(16, 16, 28, 0.7);
            --neon-blue: #00f3ff;
            --neon-purple: #b026ff;
            --neon-pink: #ff0055;
            --text-color: #e2e8f0;
            --border-glow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(176, 38, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 243, 255, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            user-select: none;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(10, 10, 18, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--neon-blue);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { display: flex; align-items: center; gap: 12px; font-size: 24px; font-weight: 800; text-transform: uppercase; color: #fff; }
        .logo img { width: 42px; height: 42px; border-radius: 8px; }
        .logo span { color: var(--neon-pink); }
        
        .btn-buy {
            background: linear-gradient(135deg, var(--neon-blue), #0088cc);
            color: #fff; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%;
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 10, 0.85); backdrop-filter: blur(8px); z-index: 1000;
            justify-content: center; align-items: center; padding: 20px;
        }

        .modal-content {
            background: #10101c; border: 2px solid var(--neon-blue); border-radius: 12px;
            width: 100%; max-width: 500px; padding: 30px; position: relative;
        }

        .form-control {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(0, 243, 255, 0.3);
            padding: 12px; border-radius: 6px; color: #fff; margin-bottom: 15px;
        }

        .close-modal { position: absolute; top: 20px; right: 20px; cursor: pointer; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <header>
        <div class="logo"><img src="favicon.jpeg"> RX7 <span>Store</span></div>
        <button class="btn-buy" style="width: auto;" onclick="openAdminClick()">Painel Admin</button>
    </header>

    <div id="loginModal" class="modal" style="display:flex;">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">Acesso Restrito</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <input type="text" id="adminUser" class="form-control" placeholder="Usuário" required>
                <input type="password" id="adminPass" class="form-control" placeholder="Senha" required>
                <button type="submit" class="btn-buy">Autenticar</button>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB7cxrpXsf_abhtCeEsh9yURrt9GNcn1eM",
            authDomain: "rx7-store.firebaseapp.com",
            databaseURL: "https://rx7-store-default-rtdb.firebaseio.com",
            projectId: "rx7-store",
            storageBucket: "rx7-store.firebasestorage.app",
            messagingSenderId: "782894155670",
            appId: "1:782894155670:web:0ba17769fc39a0aa333fb7"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1517990689185468529/NMuzMp4BR107okeYLDKSDwZ8vxF1-vYrMxyxv-zOW1CANGCu_36h5rlxPdAoBwX0NSlJ";

        let isAdminLoggedIn = false;
        let loggedAdminUsername = "";

        // Função de Notificação para Discord
        function notifyAdminAction(productPayload, actionType) {
            const embedData = {
                username: "RX7 Admin Logger",
                embeds: [{
                    title: `🛠️ Ação no Painel Admin: ${actionType}`,
                    color: 3066993,
                    fields: [
                        { name: "👤 Autor", value: `\`${loggedAdminUsername}\``, inline: true },
                        { name: "📦 Produto", value: productPayload.name, inline: true },
                        { name: "💰 Preço", value: `R$ ${productPayload.price.toFixed(2)}`, inline: true },
                        { name: "📂 Categoria", value: productPayload.category, inline: true }
                    ],
                    timestamp: new Date()
                }]
            };

            fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(embedData)
            });
        }

        async function handleProductSubmit(e) {
            e.preventDefault();
            const idFb = document.getElementById('editProductId').value;
            const productPayload = {
                name: document.getElementById('prodName').value,
                price: parseFloat(document.getElementById('prodPrice').value),
                category: document.getElementById('prodCategorySelect').value === "__NEW__" ? document.getElementById('prodCategoryNew').value : document.getElementById('prodCategorySelect').value,
                desc: document.getElementById('prodDesc').value
            };

            if (idFb && idFb.trim() !== "") {
                database.ref(`products/${idFb}`).update(productPayload).then(() => {
                    notifyAdminAction(productPayload, "Edição de Produto");
                    alert("Produto atualizado!");
                });
            } else {
                database.ref('products').push(productPayload).then(() => {
                    notifyAdminAction(productPayload, "Criação de Novo Produto");
                    alert("Produto adicionado!");
                });
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value.trim();
            
            // Simulação de login simples
            if (user === 'gostosao' && pass === '569124') {
                isAdminLoggedIn = true;
                loggedAdminUsername = user;
                document.getElementById('loginModal').style.display = 'none';
                alert("Logado como Chefe!");
            } else {
                alert("Credenciais inválidas");
            }
        }

        function openAdminClick() {
            if(isAdminLoggedIn) { alert("Painel aberto"); } 
            else { document.getElementById('loginModal').style.display = 'flex'; }
        }
    </script>
</body>
</html>
