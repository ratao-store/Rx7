<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RX7 Story</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">
RX7 Story
</div>

<div class="top">

<button onclick="toggleCart()">
🛒
<span id="cartCount">0</span>
</button>

<button onclick="openLogin()">
👤
</button>

</div>

</header>

<section class="hero">

<h1>
Digital Marketplace
</h1>

<p>
Comunidades digitais premium
</p>

</section>

<div id="overlay">

<div
id="cart">

<div
style="
display:flex;
justify-content:space-between;
">

<h2>

🛒 Carrinho

</h2>

<button
onclick="fechar()">

✕

</button>

</div>

<div id="cartItems">

Vazio

</div>

</div>

</div>

<section
id="produtoArea">

</section>

<div id="cart">

<h2>
🛒 Seu Carrinho
</h2>

<div id="cartItems"></div>

<div id="total">

Total:
R$0

</div>

<button onclick="finishOrder()">

Finalizar

</button>

</div>

<div id="login">

<h2>

Entrar

</h2>

<input
id="user"
placeholder="Usuário">

<input
id="pass"
type="password"
placeholder="Senha">

<button onclick="register()">

Criar conta

</button>

<button onclick="login()">

Entrar

</button>

</div>

<script src="auth.js"></script>
<script src="app.js"></script>

</body>
</html>
