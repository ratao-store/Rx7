<html lang="pt-BR">

<head>

<meta
name="viewport"

<title>RX7 Admin</title>

<style>

body{

}

.box{

}

Painel RX7

<script>

function entrar(){

if(

document
.getElementById(
"senha"
)
.value

===

"admin1234"

){

document
.getElementById(
"login"
)
.style.display=

"none"

document
.getElementById(
"painel"
)
.style.display=

}

else{

"Senha incorreta"
