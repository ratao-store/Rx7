<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>RX7 Admin</title>

<style>

body{
margin:0;
background:#050505;
color:white;
font-family:Arial;
}

.container{
max-width:700px;
margin:auto;
padding:30px;
}

.card{
background:#101010;
padding:25px;
border-radius:24px;
margin-top:20px;
}

input,textarea{

width:100%;

padding:16px;

margin-top:10px;

background:#171717;

color:white;

border:none;

border-radius:16px;

box-sizing:border-box;

}

button{

width:100%;

padding:18px;

margin-top:20px;

border:none;

border-radius:16px;

background:#5B7FFF;

color:white;

cursor:pointer;

}

#painel{
display:none;
}

img{

width:100%;

border-radius:20px;

margin-top:20px;

}

</style>

</head>

<body>

<div class="container">

<div id="login">

<div class="card">

<h1>

Painel RX7

</h1>

<input
id="senha"
type="password"
placeholder="Senha">

<button
onclick="entrar()">

Entrar

</button>

</div>

</div>

<div id="painel">

<div class="card">

<h2>

Editar Produto

</h2>

<input
id="nome"
placeholder="Nome">

<input
id="preco"
placeholder="Preço">

<input
id="imagem"
placeholder="Link da imagem">

<textarea
id="descricao"
placeholder="Descrição">

</textarea>

<img
id="preview">

<button
onclick="mostrarImagem()">

Ver Imagem

</button>

<button
onclick="salvar()">

Salvar Produto

</button>

</div>

</div>

</div>

<script>

function entrar(){

if(
senha.value
==="admin1234"
){

login.style.display=
"none"

painel.style.display=
"block"

carregar()

}

else{

alert(
"Senha incorreta"
)

}

}

function mostrarImagem(){

preview.src=
imagem.value

}

function salvar(){

const produto={

nome:
nome.value,

preco:
preco.value,

imagem:
imagem.value,

descricao:
descricao.value

}

localStorage.setItem(

"rx7_produto",

JSON.stringify(
produto
)

)

alert(
"Produto salvo"

)

}

function carregar(){

const p=

JSON.parse(

localStorage.getItem(
"rx7_produto"
)

)

if(!p)
return

nome.value=
p.nome||""

preco.value=
p.preco||""

imagem.value=
p.imagem||""

descricao.value=
p.descricao||""

preview.src=
p.imagem||""

}

</script>

</body>

</html>
